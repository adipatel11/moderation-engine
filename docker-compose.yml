services:
  moderation-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11.15"
        UV_VERSION: "0.11.15"
    image: moderation-engine:dev
    container_name: moderation-engine
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
